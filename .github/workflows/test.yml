name: 🧪

on:
  push:

jobs:
  test-run:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        name:
          - foo
          - bar

    outputs: ${{ fromJSON(steps.test-run.outputs) }}

    steps:
      - name: Failing task
        id: test-run
        uses: actions/github-script@v6
        env:
          NAME: ${{ matrix.name }}
        with:
          script: |
            return process.env.NAME

      - uses: cloudposse/github-action-matrix-outputs-write@main
        with:
          matrix-step-name: matrix-output
          matrix-key: ${{ matrix.name }}
          outputs: |-
            ${{ matrix.name }}:${{ toJson(steps.test-run.outputs.result) }}

  test-summary:
    runs-on: ubuntu-latest
    needs: test-run
    
    steps:
      - uses: cloudposse/github-action-matrix-outputs-read@main
        id: read
        with:
          matrix-step-name: build
          
      - run: echo "${{ steps.read.outputs }}"
