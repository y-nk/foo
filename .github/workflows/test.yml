name: 🧪

on:
  push:

jobs:
  test-run:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        name:
          - foo
          - bar

    outputs: ${{ fromJSON(steps.test-run.outputs) }}

    steps:
      - name: Failing task
        id: test-run
        uses: actions/github-script@v6
        env:
          NAME: ${{ matrix.name }}
        with:
          script: |
            core.exportVariable(process.env.NAME, 'foobar')

  test-summary:
    runs-on: ubuntu-latest
    needs: test-run
    
    steps:
      - run: echo "${{ toJSON(needs.test-run) }}"
