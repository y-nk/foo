name: 🧪

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing task
        run: |
           set +e
           set +o pipefail
           
           function yarn_e2e() {
             echo "attempt: $1"
             if [[ ! "$1" -eq "3" ]]; then
               echo "should exit 1"
               return 1
             fi
             echo "should exit 0"
             return 0
           }
           
           for attempt in {1..3}; do
             yarn_e2e $attempt
             code=$?
             echo code=$code
             [[ "$code" -eq "0" ]] && exit 0
           done
           exit 1
