name: 🧪

on:
  push:

jobs:
  test-run:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        name:
          - foo
          - bar

    outputs:
      test-run: ${{ steps.test-run.outputs.result }}

    steps:
      - name: Failing task
        id: test-run
        uses: actions/github-script@v6
        env:
          NAME: ${{ matrix.name }}
        with:
          script: |
            return process.env.NAME

  test-summary:
    runs-on: ubuntu-latest
    needs: test-run
    
    steps:
      - run: echo "${{ toJSON(needs.test-run) }}"
