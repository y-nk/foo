name: 🧪
run-name: 🧪 (${{ inputs.env-name }})

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      env-name:
        default: 'staging'

jobs:
  get-env:
    runs-on: ubuntu-latest

    outputs:
      env-name: ${{ steps.env-name.outputs.result }}

    steps:
      - id: env-name
        run: echo "result=${{ inputs.env-name }}" >> "$GITHUB_OUTPUT"
  test:
    runs-on: ubuntu-latest
    needs: get-env

    environment:
      name: ${{ needs.get-env.outputs.env-name }}
      url: ${{ vars.ENVIRONMENT_URL }}

    steps:
      - run: echo "${{ github }}"
