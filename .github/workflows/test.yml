name: 🧪

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing task
        run: |
           set +e
           set +o pipefail
           
           function yarn_e2e() {
             echo "attempt: $0"
             if [ $0 -eq 2 ]; then
               echo "should exit 1"
               exit 1
             fi
             echo "should exit 0"
             exit 0
           }
           
           for attempt in {1..3}; do
             yarn_e2e $attempt
             [ $? -eq 0 ] && exit 0
           done
           exit 1
