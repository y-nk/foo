name: 🧪

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing task
        run: |
           set +e
           set +o pipefail
           
           for attempt in {1..3}; do
             [ $attempt -eq 2 ] && false || true
             [ $? -eq 0 ] && exit 0
           done
           exit 1
